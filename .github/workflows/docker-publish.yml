name: Build and Publish Docker images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Optionally login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atsboost-backend:latest
            ghcr.io/${{ github.repository_owner }}/atsboost-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atsboost-frontend:latest
            ghcr.io/${{ github.repository_owner }}/atsboost-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mirror images to Docker Hub (optional)
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/atsboost-backend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/atsboost-backend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/atsboost-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/atsboost-backend:${{ github.sha }}

          docker pull ghcr.io/${{ github.repository_owner }}/atsboost-frontend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/atsboost-frontend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/atsboost-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/atsboost-frontend:${{ github.sha }}
